name: Public release audit

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Candidate ref to audit, e.g. HEAD or public/public-release/YYYYMMDD
        required: false
        default: HEAD
      public_base:
        description: Public baseline ref
        required: false
        default: public/main
  push:
    branches:
      - public-release/**
    tags:
      - public-v*

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private candidate
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch public refs
        run: |
          git remote add public https://github.com/G-Schumacher44/strata-oss.git
          git fetch public '+refs/heads/*:refs/remotes/public/*'

      - name: Run public release audit
        run: |
          TARGET_REF="${{ github.event.inputs.target_ref || 'HEAD' }}"
          PUBLIC_BASE="${{ github.event.inputs.public_base || 'public/main' }}"
          python scripts/check_public_release.py --base "$PUBLIC_BASE" --target "$TARGET_REF"
