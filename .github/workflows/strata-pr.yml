name: strata-pr

on:
  pull_request:
    paths:
      - '**/*.lkml'

jobs:
  pr-analysis:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Get changed LookML files
        id: changed
        run: |
          FILES=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD \
            -- '*.lkml' | head -100 | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "count=$(echo "$FILES" | wc -w)" >> "$GITHUB_OUTPUT"

      - name: Run Strata PR analysis
        if: steps.changed.outputs.count != '0' && steps.changed.outputs.files != ''
        run: |
          python scripts/pr_comment.py \
            --repo . \
            --changed ${{ steps.changed.outputs.files }} \
            --pr "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
