name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install hatchling
        run: pip install hatchling

      - name: Build wheel and sdist
        run: python -m hatchling build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  sync-to-oss:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch public refs
        run: |
          git remote add public https://github.com/G-Schumacher44/strata-oss.git || true
          git fetch public main
          git fetch public '+refs/heads/*:refs/remotes/public/*'

      - name: Sanitize release (remove private paths)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Drive sanitization from .publicignore so the denylist is the single
          # source of truth (keeps conductor framework docs public, strips only
          # live working state / local config). Comments and blanks are skipped.
          PATTERNS=$(grep -vE '^[[:space:]]*#|^[[:space:]]*$' .publicignore || true)
          if [ -n "$PATTERNS" ]; then
            # shellcheck disable=SC2086
            git rm -r --quiet --ignore-unmatch $PATTERNS
          fi
          git commit -q -m "chore: sanitize public release [skip ci]"

      - name: Run public release audit
        run: |
          python scripts/check_public_release.py --base public/main --target HEAD

      - name: Push snapshot to OSS (fast-forward on public/main)
        if: success()
        env:
          OSS_TOKEN: ${{ secrets.OSS_PUSH_TOKEN || secrets.OSS_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # The public mirror carries its own sanitization commits, so the
          # private-main history can never fast-forward onto it directly. Instead
          # publish a single snapshot commit: the sanitized tree (HEAD^{tree})
          # parented on the current public/main tip. This always fast-forwards,
          # preserves public lineage, and adds exactly one commit per release.
          SANITIZED_TREE=$(git rev-parse 'HEAD^{tree}')
          SNAPSHOT=$(GIT_AUTHOR_NAME="github-actions[bot]" \
            GIT_AUTHOR_EMAIL="github-actions[bot]@users.noreply.github.com" \
            GIT_COMMITTER_NAME="github-actions[bot]" \
            GIT_COMMITTER_EMAIL="github-actions[bot]@users.noreply.github.com" \
            git commit-tree "$SANITIZED_TREE" -p public/main \
              -m "release: sync ${GITHUB_REF_NAME}")
          # Use x-access-token as the username for reliable PAT authentication
          git remote set-url public "https://x-access-token:${OSS_TOKEN}@github.com/G-Schumacher44/strata-oss.git"
          git push public "${SNAPSHOT}:main"
