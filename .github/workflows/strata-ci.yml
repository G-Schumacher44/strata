name: strata-ci

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Run Strata CI on gcs_analytics
        run: make ci

      - name: Run Strata CI on thelook
        run: make ci REPO=tests/lookml/thelook USAGE=tests/fixtures/playground_usage_facts.json SCHEMA=tests/fixtures/playground_schema_facts.json

      - name: Run Strata CI on enterprise_mono
        run: make ci REPO=tests/lookml/enterprise_mono USAGE=tests/fixtures/enterprise_usage_facts.json SCHEMA=tests/fixtures/enterprise_schema_facts.json

      - name: Build fixture IR
        run: python scripts/build_ir.py --repo tests/fixtures --usage-fixture tests/fixtures/usage_facts.json --cache /tmp/strata_ir.db

      - name: Notification dry run
        run: python scripts/notify.py --artifacts output/gcs_analytics --dry-run

      - name: Lint L0 layer constraints
        run: |
          if grep -rn "import requests\|import httpx\|import anthropic\|import openai\|import google.generativeai" src/strata/ir/ 2>/dev/null | grep -v ".pyc"; then
            echo "FAIL: network or LLM import found in L0 IR layer"
            exit 1
          fi
          echo "L0 constraint check: clean"

      - name: Conductor spine validation
        run: python scripts/validate.py
        env:
          CI: "1"
