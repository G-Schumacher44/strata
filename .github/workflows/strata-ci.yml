name: strata-ci

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Build fixture IR
        run: python scripts/build_ir.py --repo tests/fixtures --usage-fixture tests/fixtures/usage_facts.json --cache /tmp/strata_ir.db

      - name: Run Strata scenario gates
        run: python scripts/check_strata.py

      - name: Validate replay facts
        run: python scripts/check_replay.py

      - name: Conductor spine validation
        run: python scripts/validate.py
        env:
          CI: "1"
